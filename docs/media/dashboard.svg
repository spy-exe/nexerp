    <text x="358" y="302" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="800">R$ 184.920</text>
    <text x="614" y="258" fill="#c2410c" font-family="Arial, sans-serif" font-size="18">Ticket médio</text>
    <text x="614" y="302" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="800">R$ 426</text>
