  <rect x="330" y="378" width="742" height="218" rx="28" fill="#ffffff" stroke="#e2e8f0"/>
  <polyline points="370,546 455,506 540,520 625,462 710,480 795,416 880,438 1032,390" fill="none" stroke="#0d9488" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
