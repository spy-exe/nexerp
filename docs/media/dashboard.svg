<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard NexERP</title>
  <desc id="desc">Preview visual do dashboard operacional do NexERP.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="56%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect x="52" y="54" width="1096" height="612" rx="30" fill="#f8fafc"/>
  <rect x="80" y="88" width="210" height="548" rx="24" fill="#0f172a"/>
